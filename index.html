{
  "html_game": "<!DOCTYPE html>\n<html lang=\"pt-br\">\n<head>\n  <meta charset=\"UTF-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n  <title>Anime Emerald Idol - Deagle Edition</title>\n  <style>\n    :root {\n      --hair: #ff4500; --hair-dark: #b33000; --hair-light: #ff7f50;\n      --skin: #fff1e0; --skin-shadow: #f5d4bc;\n      --eye: #00ff88; --eye-dark: #1b5e20;\n      --dress: #1b5e20; --dress-light: #2ecc71;\n      --bg: #0a0b10;\n    }\n\n    body {\n      margin: 0; overflow: hidden; background: var(--bg);\n      display: flex; align-items: center; justify-content: center;\n      height: 100vh; font-family: 'Arial', sans-serif; color: white;\n    }\n\n    #stage {\n      position: relative; width: 600px; height: 800px;\n      display: flex; flex-direction: column; align-items: center; justify-content: flex-end;\n    }\n\n    .ui {\n      position: absolute; top: 20px; text-align: center; z-index: 100;\n    }\n\n    .score-text { font-size: 3rem; font-weight: 900; text-shadow: 0 0 15px var(--eye); }\n\n    #character-container {\n      width: 450px; height: 600px; position: relative;\n      transform-origin: bottom center; transition: transform 0.15s cubic-bezier(0.17, 0.67, 0.83, 0.67);\n    }\n\n    /* --- Poses --- */\n    .pose-left { transform: translateX(-40px) rotate(-10deg); }\n    .pose-right { transform: translateX(40px) rotate(10deg); }\n    .pose-up { transform: translateY(-30px) scale(1.05); }\n    .pose-down { transform: translateY(15px) scaleY(0.9); }\n    .recoil { animation: recoil-anim 0.2s ease-out; }\n\n    @keyframes recoil-anim {\n      0% { transform: translateY(0) rotate(0); }\n      40% { transform: translateY(20px) rotate(-15deg); }\n      100% { transform: translateY(0) rotate(0); }\n    }\n\n    /* --- Gun Mechanics --- */\n    #gun-layer { opacity: 0; transition: opacity 0.1s; }\n    .show-gun #gun-layer { opacity: 1; }\n    \n    #muzzle-flash {\n      position: absolute; width: 250px; height: 250px; \n      background: radial-gradient(circle, #fff 0%, #fff0 70%);\n      left: 50%; top: 250px; transform: translateX(40px); \n      opacity: 0; mix-blend-mode: screen; pointer-events: none;\n    }\n\n    .flash-active { animation: flash-hit 0.15s ease-out; }\n    @keyframes flash-hit { 0% { opacity: 1; transform: translateX(40px) scale(0.5); } 100% { opacity: 0; transform: translateX(40px) scale(2); } }\n\n    .shake { animation: shake-screen 0.1s infinite; }\n    @keyframes shake-screen { 0%{transform: translate(2px,1px)} 50%{transform: translate(-2px,-2px)} 100%{transform: translate(2px,1px)} }\n  </style>\n</head>\n<body>\n\n  <div class=\"ui\">\n    <div class=\"score-text\" id=\"score\">00000</div>\n    <div style=\"font-size: 12px; color: #555;\">WASD / SETAS - DOUBLE S/DOWN P/ ATIRAR</div>\n  </div>\n\n  <div id=\"stage\">\n    <div id=\"muzzle-flash\"></div>\n    <div id=\"character-container\">\n      <svg viewBox=\"0 0 500 700\" xmlns=\"http://www.w3.org/2000/svg\">\n        <!-- Camada de Cabelo (Trás) -->\n        <path d=\"M150 300 Q100 450 160 600 M350 300 Q400 450 340 600\" fill=\"none\" stroke=\"var(--hair-dark)\" stroke-width=\"45\" stroke-linecap=\"round\"/>\n        \n        <!-- Vestido -->\n        <path d=\"M200 400 L300 400 L340 650 L160 650 Z\" fill=\"var(--dress)\" stroke=\"#000\" stroke-width=\"3\"/>\n        \n        <!-- Braços -->\n        <rect x=\"165\" y=\"410\" width=\"22\" height=\"120\" rx=\"11\" fill=\"var(--skin)\" stroke=\"#000\" transform=\"rotate(20 165 410)\"/>\n        <rect id=\"right-arm\" x=\"310\" y=\"410\" width=\"22\" height=\"120\" rx=\"11\" fill=\"var(--skin)\" stroke=\"#000\" style=\"transition: transform 0.1s\"/>\n\n        <!-- Cabeça (Estilo Anime) -->\n        <path d=\"M190 250 Q190 380 250 380 Q310 380 310 250 Z\" fill=\"var(--skin)\" stroke=\"#000\" stroke-width=\"2.5\"/>\n\n        <!-- Olhos (Verde Esmeralda) -->\n        <g class=\"eyes-group\">\n          <ellipse cx=\"225\" cy=\"305\" rx=\"18\" ry=\"25\" fill=\"#000\"/>\n          <ellipse cx=\"225\" cy=\"308\" rx=\"14\" ry=\"20\" fill=\"var(--eye)\"/>\n          <circle cx=\"218\" cy=\"295\" r=\"6\" fill=\"#fff\"/>\n          \n          <ellipse cx=\"275\" cy=\"305\" rx=\"18\" ry=\"25\" fill=\"#000\"/>\n          <ellipse cx=\"275\" cy=\"308\" rx=\"14\" ry=\"20\" fill=\"var(--eye)\"/>\n          <circle cx=\"268\" cy=\"295\" r=\"6\" fill=\"#fff\"/>\n        </g>\n\n        <!-- Franja -->\n        <path d=\"M185 270 Q180 140 250 140 Q320 140 315 270\" fill=\"var(--hair)\" stroke=\"#000\" stroke-width=\"2\"/>\n        <path d=\"M185 270 L210 310 L235 280 L250 320 L270 280 L300 310 L315 270\" fill=\"var(--hair)\" stroke=\"#000\"/>\n\n        <!-- Desert Eagle -->\n        <g id=\"gun-layer\">\n          <rect x=\"310\" y=\"330\" width=\"130\" height=\"45\" rx=\"4\" fill=\"#444\" stroke=\"#000\" stroke-width=\"2\"/> <!-- Barrel -->\n          <rect x=\"310\" y=\"370\" width=\"35\" height=\"65\" rx=\"4\" fill=\"#222\" stroke=\"#000\" transform=\"rotate(-15 310 370)\"/> <!-- Grip -->\n          <path d=\"M315 335 H425 V345 H315 Z\" fill=\"#666\" opacity=\"0.4\"/> <!-- Detail -->\n        </g>\n\n        <!-- Boca/Rosto -->\n        <path d=\"M240 350 Q250 360 260 350\" fill=\"none\" stroke=\"#e57373\" stroke-width=\"2.5\" stroke-linecap=\"round\"/>\n      </svg>\n    </div>\n  </div>\n\n  <script>\n    const char = document.getElementById('character-container');\n    const scoreEl = document.getElementById('score');\n    const flash = document.getElementById('muzzle-flash');\n    const stage = document.getElementById('stage');\n    const rArm = document.getElementById('right-arm');\n\n    let score = 0;\n    let lastDown = 0;\n    let isBusy = false;\n    const audio = new (window.AudioContext || window.webkitAudioContext)();\n\n    function playSound(f, v, t, d) {\n      if (audio.state === 'suspended') audio.resume();\n      const o = audio.createOscillator();\n      const g = audio.createGain();\n      o.type = t; o.frequency.setValueAtTime(f, audio.currentTime);\n      g.gain.setValueAtTime(v, audio.currentTime);\n      g.gain.exponentialRampToValueAtTime(0.01, audio.currentTime + d);\n      o.connect(g); g.connect(audio.destination);\n      o.start(); o.stop(audio.currentTime + d);\n    }\n\n    function shoot() {\n      isBusy = true;\n      char.classList.add('show-gun', 'recoil');\n      flash.classList.add('flash-active');\n      stage.classList.add('shake');\n      rArm.style.transform = \"translate(-35px, -80px) rotate(-110deg)\";\n      \n      playSound(60, 0.8, 'square', 0.3);\n      playSound(120, 0.5, 'triangle', 0.1);\n\n      setTimeout(() => {\n        char.classList.remove('show-gun', 'recoil');\n        flash.classList.remove('flash-active');\n        stage.classList.remove('shake');\n        rArm.style.transform = \"\";\n        isBusy = false;\n      }, 250);\n    }\n\n    window.addEventListener('keydown', (e) => {\n      if (isBusy) return;\n      const key = e.key.toLowerCase();\n      let move = '';\n\n      if (key === 'a' || key === 'arrowleft') move = 'pose-left';\n      if (key === 'd' || key === 'arrowright') move = 'pose-right';\n      if (key === 'w' || key === 'arrowup') move = 'pose-up';\n      if (key === 's' || key === 'arrowdown') {\n        move = 'pose-down';\n        const now = Date.now();\n        if (now - lastDown < 250) { shoot(); return; }\n        lastDown = now;\n      }\n\n      if (move) {\n        char.classList.remove('pose-left', 'pose-right', 'pose-up', 'pose-down');\n        void char.offsetWidth;\n        char.classList.add(move);\n        \n        score += 100;\n        scoreEl.innerText = score.toString().padStart(5, '0');\n        playSound(150, 0.1, 'sine', 0.05);\n\n        setTimeout(() => char.classList.remove(move), 150);\n      }\n    });\n\n    document.body.onclick = () => audio.resume();\n  </script>\n</body>\n</html>"
}
